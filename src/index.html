<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
    <header>
        <h1>Quiz App</h1>
        <p>Answer the questions correctly to get a point!</p>
    </header>
    <div class="questions">
        <h3>Questions will go here</h3>
        <div class="buttons">
        <button class="question1"><span>Question 1</span></button>
        <button class="question2"><span>Question 2</span></button>
        <button class="question3"><span>Question 3</span></button>
        <button class="question4"><span>Question 4</span></button>
        <button class="question5"><span>Question 5</span></button>
    </div>
   </div>
    <button class="next">Next</button>
   <script src="app.js"></script> 
</body>
</html>
